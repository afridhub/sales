<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Banglalink Fida Hassan Admin</title>
    <link rel="icon" type="image/png" href="assets/images/logo/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <div id="header-container"></div>
    <div id="navbar-container"></div>

    <main class="max-w-6xl mx-auto p-4 md:p-6 transition-opacity duration-300 opacity-0">
        <div class="space-y-6 fade-in">
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                <div class="flex flex-col md:flex-row gap-4 mb-4">
                    <div class="flex-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Search Staff Name</label>
                        <input type="text" id="f-name" class="input-box" placeholder="Type here..." oninput="renderTable()" list="name-list">
                        <datalist id="name-list"></datalist>
                    </div>
                    <div class="flex gap-2">

                        <button onclick="exportExcel()" class="bg-gradient-to-r from-emerald-600 to-emerald-700 hover:from-emerald-700 hover:to-emerald-800 text-white px-5 py-2.5 rounded-lg font-bold text-sm transition-all flex items-center h-[42px] shadow hover:shadow-md">
                            <i class="fas fa-file-excel mr-2"></i> Excel
                        </button>
                    </div>
                </div>
                
                <!-- Summary Cards -->
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6" id="summary-cards">
                    <div class="summary-card bg-white p-4 rounded-xl">
                        <p class="text-slate-500 text-sm">Total Records</p>
                        <p id="total-records" class="text-2xl font-bold mt-1">0</p>
                    </div>
                    <div class="summary-card bg-white p-4 rounded-xl">
                        <p class="text-slate-500 text-sm">Total Sales</p>
                        <p id="total-sales" class="text-2xl font-bold mt-1 text-green-600">0.00 Tk</p>
                    </div>
                    <div class="summary-card bg-white p-4 rounded-xl">
                        <p class="text-slate-500 text-sm">Outstanding Dues</p>
                        <p id="outstanding-dues" class="text-2xl font-bold mt-1 text-red-600">0.00 Tk</p>
                    </div>
                    <div class="summary-card bg-white p-4 rounded-xl">
                        <p class="text-slate-500 text-sm">Active Staff</p>
                        <p id="active-staff" class="text-2xl font-bold mt-1">0</p>
                    </div>
                </div>


                
                <!-- Report Table (initially hidden) -->
                <div id="report-content">
                    <div class="w-full overflow-x-auto hide-scrollbar max-h-[500px]">
                        <table id="report-table" class="w-full text-left text-sm responsive-table">
                            <thead class="bg-slate-50 sticky top-0">
                                <tr class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">
                                    <th class="p-3">Date</th>
                                    <th class="p-3">Staff Name</th>
                                    <th class="p-3">Role</th>
                                    <th class="p-3">Net Sales</th>
                                    <th class="p-3">Paid</th>
                                    <th class="p-3">Due</th>
                                    <th class="p-3">Status</th>
                                </tr>
                            </thead>
                            <tbody id="report-body" class="divide-y divide-slate-100">
                                <!-- Dynamic content will be inserted here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>
    <script src="js/script.js" defer></script>
</body>
</html>
