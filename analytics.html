<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Banglalink Fida Hassan Admin</title>
    <link rel="icon" type="image/png" href="assets/images/logo/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <div id="header-container"></div>
    <div id="navbar-container"></div>

    <main class="max-w-6xl mx-auto p-4 md:p-6">
        <div class="space-y-6 fade-in">
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                <h2 class="text-lg font-bold text-slate-800 mb-4">Sales Recap</h2>
                <p class="text-sm text-slate-500 mb-4">Use the controls below to view daily or monthly totals. You can also filter by staff name.</p>

                <!-- filters -->
                <div class="flex flex-col md:flex-row gap-4 mb-6">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Select Date</label>
                        <input type="date" id="analytics-date" class="input-box" onchange="updateAnalytics()">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Select Month</label>
                        <input type="month" id="analytics-month" class="input-box" onchange="updateAnalytics()">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Staff Name</label>
                        <input type="text" id="analytics-name" class="input-box" placeholder="Filter by staff" oninput="updateAnalytics()">
                    </div>
                </div>

                <!-- summary cards -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6" id="analytics-cards">
                    <div class="summary-card bg-gradient-to-br from-blue-50 to-indigo-50 p-5 rounded-xl">
                        <div class="flex items-center">
                            <div class="bg-blue-100 p-3 rounded-lg mr-4">
                                <i class="fas fa-calendar-day text-blue-600 text-xl"></i>
                            </div>
                            <div>
                                <p class="text-slate-500 text-sm">Daily Total</p>
                                <p id="daily-total" class="text-2xl font-bold mt-1">0.00 Tk</p>
                            </div>
                        </div>
                    </div>
                    <div class="summary-card bg-gradient-to-br from-green-50 to-emerald-50 p-5 rounded-xl">
                        <div class="flex items-center">
                            <div class="bg-green-100 p-3 rounded-lg mr-4">
                                <i class="fas fa-calendar-alt text-green-600 text-xl"></i>
                            </div>
                            <div>
                                <p class="text-slate-500 text-sm">Monthly Total</p>
                                <p id="monthly-total" class="text-2xl font-bold mt-1">0.00 Tk</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Skeleton Loader for Analytics -->
                <div id="analytics-skeleton" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="skeleton-card">
                            <div class="flex items-center">
                                <div class="skeleton" style="width: 60px; height: 60px; border-radius: 8px; margin-right: 16px;"></div>
                                <div style="flex: 1;">
                                    <div class="skeleton skeleton-text" style="height: 16px; width: 80px;"></div>
                                    <div class="skeleton skeleton-text" style="height: 28px; width: 120px; margin-top: 8px;"></div>
                                </div>
                            </div>
                        </div>
                        <div class="skeleton-card">
                            <div class="flex items-center">
                                <div class="skeleton" style="width: 60px; height: 60px; border-radius: 8px; margin-right: 16px;"></div>
                                <div style="flex: 1;">
                                    <div class="skeleton skeleton-text" style="height: 16px; width: 80px;"></div>
                                    <div class="skeleton skeleton-text" style="height: 28px; width: 120px; margin-top: 8px;"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-xl">
                        <div class="skeleton skeleton-text" style="height: 20px; width: 200px; margin-bottom: 16px;"></div>
                        <div class="skeleton-row">
                            <div class="skeleton skeleton-cell" style="flex: 1;"></div>
                            <div class="skeleton skeleton-cell" style="flex: 1;"></div>
                        </div>
                        <div class="skeleton-row">
                            <div class="skeleton skeleton-cell" style="flex: 1;"></div>
                            <div class="skeleton skeleton-cell" style="flex: 1;"></div>
                        </div>
                        <div class="skeleton-row">
                            <div class="skeleton skeleton-cell" style="flex: 1;"></div>
                            <div class="skeleton skeleton-cell" style="flex: 1;"></div>
                        </div>
                    </div>
                </div>

                <!-- Analytics Content (initially hidden) -->
                <div id="analytics-content" class="hidden">
                    <div class="bg-slate-50 p-4 rounded-xl mb-6">
                        <h3 class="font-bold text-slate-700 mb-3">Day‑to‑Day Analysis</h3>
                        <div id="daily-breakdown" class="space-y-2">
                            <!-- dynamic rows -->
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div id="footer-container"></div>
    <script src="js/script.js" defer></script>
</body>
</html>
