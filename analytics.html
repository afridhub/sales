<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Banglalink Fida Hassan Admin</title>
    <link rel="icon" type="image/png" href="assets/images/logo/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <div id="header-container"></div>
    <div id="navbar-container"></div>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        <div class="space-y-6 fade-in">
            <!-- Filter Section -->
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <h2 class="text-lg font-bold text-slate-800 mb-4">Filter</h2>
                <div class="flex flex-col md:flex-row gap-4 items-end">
                    <div class="flex-1">
                        <label class="text-xs font-bold text-slate-600 uppercase block mb-2">From</label>
                        <input type="date" id="filter-from" class="input-box" onchange="updateAnalytics()">
                    </div>
                    <div class="flex-1">
                        <label class="text-xs font-bold text-slate-600 uppercase block mb-2">To</label>
                        <input type="date" id="filter-to" class="input-box" onchange="updateAnalytics()">
                    </div>
                    <div class="flex-1">
                        <label class="text-xs font-bold text-slate-600 uppercase block mb-2">Search by Name</label>
                        <input type="text" id="filter-name" class="input-box" placeholder="Search..." oninput="updateAnalytics()">
                    </div>
                    <button onclick="updateAnalytics()" class="px-6 py-2.5 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition-colors active:scale-95">
                        Search
                    </button>
                </div>
            </div>

            <!-- Summary Cards Section -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <!-- Today's Revenue Card -->
                <div class="bg-gradient-to-br from-green-100 to-green-50 p-6 rounded-xl border border-green-200 shadow-sm">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-slate-700 text-sm font-semibold">Today's Revenue</p>
                            <p id="todays-revenue" class="text-3xl font-bold text-green-700 mt-2">0 Taka</p>
                        </div>
                        <div class="bg-green-200 p-4 rounded-lg">
                            <i class="fas fa-money-bill-wave text-green-700 text-2xl"></i>
                        </div>
                    </div>
                </div>

                <!-- Today's Due Card -->
                <div class="bg-gradient-to-br from-orange-100 to-orange-50 p-6 rounded-xl border border-orange-200 shadow-sm">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-slate-700 text-sm font-semibold">Today's Due</p>
                            <p id="todays-due" class="text-3xl font-bold text-orange-700 mt-2">0 Taka</p>
                        </div>
                        <div class="bg-orange-200 p-4 rounded-lg">
                            <i class="fas fa-clock text-orange-700 text-2xl"></i>
                        </div>
                    </div>
                </div>

                <!-- Monthly Revenue Card -->
                <div class="bg-gradient-to-br from-blue-100 to-blue-50 p-6 rounded-xl border border-blue-200 shadow-sm">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-slate-700 text-sm font-semibold">Monthly Revenue</p>
                            <p id="monthly-revenue" class="text-3xl font-bold text-blue-700 mt-2">0 Taka</p>
                        </div>
                        <div class="bg-blue-200 p-4 rounded-lg">
                            <i class="fas fa-chart-bar text-blue-700 text-2xl"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tables Section -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- All RSO, BP Table -->
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-bold text-slate-800">RSO, BP</h3>
                        <button onclick="filterTable('all')" class="px-4 py-1.5 border border-slate-300 rounded-lg text-sm font-semibold text-slate-700 hover:bg-slate-50 transition-colors">
                            Filter
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="border-b-2 border-slate-300">
                                    <th class="text-left py-3 px-4 font-bold text-slate-700 text-sm">Date</th>
                                    <th class="text-left py-3 px-4 font-bold text-slate-700 text-sm">Name</th>
                                    <th class="text-right py-3 px-4 font-bold text-slate-700 text-sm">Revenue</th>
                                </tr>
                            </thead>
                            <tbody id="all-rso-table">
                                <!-- Data will be populated by JavaScript -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- RSO, BP All Due Table -->
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-bold text-slate-800">RSO, BP Due</h3>
                        <button onclick="filterTable('due')" class="px-4 py-1.5 border border-slate-300 rounded-lg text-sm font-semibold text-slate-700 hover:bg-slate-50 transition-colors">
                            Filter
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="border-b-2 border-slate-300">
                                    <th class="text-left py-3 px-4 font-bold text-slate-700 text-sm">Date</th>
                                    <th class="text-left py-3 px-4 font-bold text-slate-700 text-sm">Name</th>
                                    <th class="text-right py-3 px-4 font-bold text-slate-700 text-sm">Due</th>
                                </tr>
                            </thead>
                            <tbody id="due-rso-table">
                                <!-- Data will be populated by JavaScript -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>
    <script src="js/script.js" defer></script>
</body>
</html>
