<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entry - Banglalink Fida Hassan Admin</title>
    <link rel="icon" type="image/png" href="assets/images/logo/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <div id="header-container"></div>
    <div id="navbar-container"></div>

    <main class="max-w-6xl mx-auto p-4 md:p-6 transition-opacity duration-300 opacity-0">
        <div id="entry-content" class="flex flex-col lg:flex-row gap-6 fade-in">
            <div class="flex-1 space-y-4">
                <!-- Form Header -->
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1.5">Date</label>
                        <input type="date" id="date" class="input-box">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1.5">Account Role</label>
                        <select id="role" class="input-box" onchange="setRole()">
                            <option value="RSO">RSO (Full Stock)</option>
                            <option value="BP">BP (SIM Only)</option>
                        </select>
                    </div>
                    <div>
                        <label id="dynamic-name-label" class="text-[10px] font-bold text-slate-400 uppercase block mb-1.5">RSO Name</label>
                        <input type="text" id="rso-name" list="name-list" class="input-box" placeholder="Search staff..." oninput="checkHistoryBalance()">
                        <datalist id="name-list"></datalist>
                    </div>
                </div>

                <!-- Product Table -->
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="w-full overflow-x-auto hide-scrollbar">
                        <table class="w-full text-left text-sm min-w-[650px] responsive-table">
                            <thead class="bg-slate-50 border-b border-slate-200">
                                <tr class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">
                                    <th class="px-4 py-2">Item Name</th>
                                    <th class="p-4 w-24">Rate (Tk)</th>
                                    <th class="p-4 w-28">Took</th>
                                    <th class="p-4 w-28">Sold</th>
                                    <th class="px-2 py-2 text-right">Subtotal</th>
                                </tr>
                            </thead>
                            <tbody id="product-rows" class="divide-y divide-slate-100">
                                <!-- EV Recharge -->
                                <tr data-id="ev">
                                    <td class="px-4 py-2 font-bold text-slate-800">EV Recharge</td>
                                    <td class="p-4">
                                        <input type="number" step="0.01" class="rate input-box !border-none !p-0 !bg-transparent text-blue-600" value="2.75" oninput="calc()">
                                    </td>
                                    <td class="p-4">
                                        <input type="number" class="took input-box !py-1.5" placeholder="0" oninput="calc()">
                                    </td>
                                    <td class="p-4">
                                        <input type="number" class="sold input-box !py-1.5 bg-slate-50 text-slate-500" readonly tabindex="-1">
                                    </td>
                                    <td class="px-2 py-2 text-right font-bold text-blue-600 subtotal">0.00</td>
                                </tr>
                                
                                <!-- SIM Products -->
                                <tr data-id="c29" class="card-row">
                                    <td class="px-4 py-2 font-semibold text-slate-700">29 Voice</td>
                                    <td class="p-4">
                                        <input type="number" step="0.01" class="rate input-box !border-none !p-0 !bg-transparent text-slate-500" value="28.20" oninput="calc()">
                                    </td>
                                    <td class="p-4">
                                        <input type="number" class="took input-box !py-1.5" placeholder="0" oninput="calc()">
                                    </td>
                                    <td class="p-4">
                                        <input type="number" class="sold input-box !py-1.5" placeholder="0" oninput="calc()">
                                    </td>
                                    <td class="px-2 py-2 text-right font-bold subtotal">0.00</td>
                                </tr>
                                <tr data-id="c39" class="card-row">
                                    <td class="px-4 py-2 font-semibold text-slate-700">39 Voice</td>
                                    <td class="p-4">
                                        <input type="number" step="0.01" class="rate input-box !border-none !p-0 !bg-transparent text-slate-500" value="37.93" oninput="calc()">
                                    </td>
                                    <td class="p-4">
                                        <input type="number" class="took input-box !py-1.5" placeholder="0" oninput="calc()">
                                    </td>
                                    <td class="p-4">
                                        <input type="number" class="sold input-box !py-1.5" placeholder="0" oninput="calc()">
                                    </td>
                                    <td class="px-2 py-2 text-right font-bold subtotal">0.00</td>
                                </tr>
                                <tr data-id="c49" class="card-row">
                                    <td class="px-4 py-2 font-semibold text-slate-700">49 Data</td>
                                    <td class="p-4">
                                        <input type="number" step="0.01" class="rate input-box !border-none !p-0 !bg-transparent text-slate-500" value="47.65" oninput="calc()">
                                    </td>
                                    <td class="p-4">
                                        <input type="number" class="took input-box !py-1.5" placeholder="0" oninput="calc()">
                                    </td>
                                    <td class="p-4">
                                        <input type="number" class="sold input-box !py-1.5" placeholder="0" oninput="calc()">
                                    </td>
                                    <td class="px-2 py-2 text-right font-bold subtotal">0.00</td>
                                </tr>
                                
                                <!-- SIM Cards -->
                                <tr data-id="swap">
                                    <td class="px-4 py-2 font-semibold text-slate-700">Swap SIM</td>
                                    <td class="p-4">
                                        <input type="number" step="0.01" class="rate input-box !border-none !p-0 !bg-transparent text-slate-500" value="332" oninput="calc()">
                                    </td>
                                    <td class="p-4">
                                        <input type="number" class="took input-box !py-1.5" placeholder="0" oninput="calc()">
                                    </td>
                                    <td class="p-4">
                                        <input type="number" class="sold input-box !py-1.5" placeholder="0" oninput="calc()">
                                    </td>
                                    <td class="px-2 py-2 text-right font-bold subtotal">0.00</td>
                                </tr>
                                <tr data-id="v1">
                                    <td class="px-4 py-2 font-semibold text-slate-700">SIM Piece V1</td>
                                    <td class="p-4">
                                        <input type="number" step="0.01" class="rate input-box !border-none !p-0 !bg-transparent text-slate-500" value="200" oninput="calc()">
                                    </td>
                                    <td class="p-4">
                                        <input type="number" class="took input-box !py-1.5" placeholder="0" oninput="calc()">
                                    </td>
                                    <td class="p-4">
                                        <input type="number" class="sold input-box !py-1.5" placeholder="0" oninput="calc()">
                                    </td>
                                    <td class="px-2 py-2 text-right font-bold subtotal">0.00</td>
                                </tr>
                                <tr data-id="v2">
                                    <td class="px-4 py-2 font-semibold text-slate-700">SIM Piece V2</td>
                                    <td class="p-4">
                                        <input type="number" step="0.01" class="rate input-box !border-none !p-0 !bg-transparent text-slate-500" value="300" oninput="calc()">
                                    </td>
                                    <td class="p-4">
                                        <input type="number" class="took input-box !py-1.5" placeholder="0" oninput="calc()">
                                    </td>
                                    <td class="p-4">
                                        <input type="number" class="sold input-box !py-1.5" placeholder="0" oninput="calc()">
                                    </td>
                                    <td class="px-2 py-2 text-right font-bold subtotal">0.00</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Calculation Panel -->
            <div class="w-full lg:w-80 flex-shrink-0 space-y-4">
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-lg">
                    <h3 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-5 border-b pb-2">Calculated Bill</h3>
                    
                    <div class="space-y-4 text-sm">
                        <div class="flex justify-between items-center">
                            <span class="font-medium text-slate-600">Previous Due</span>
                            <span id="history-due" class="font-bold text-red-500">0.00</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="font-medium text-slate-600">Net Sales</span>
                            <span id="total-val" class="font-bold text-slate-800">0.00</span>
                        </div>
                        
                        <div class="pt-2">
                            <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1.5">Fuel Cost (Tk)</label>
                            <input type="number" id="fuel" class="input-box !bg-orange-50 !border-orange-100 !text-orange-700" value="100" oninput="calc()">
                        </div>

                        <div class="grid grid-cols-2 gap-3 pt-2">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1.5">Paid (Cash)</label>
                                <input type="number" id="paid" class="input-box !bg-blue-50 !border-blue-100 !text-blue-700" placeholder="0" oninput="calc()">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1.5">Repayment</label>
                                <input type="number" id="prev" class="input-box !bg-green-50 !border-green-100 !text-green-700" placeholder="0" oninput="calc()">
                            </div>
                        </div>

                        <div class="bg-gradient-to-r from-slate-800 to-slate-900 rounded-xl p-5 mt-4 text-white shadow-inner">
                            <p class="text-[10px] font-bold opacity-70 uppercase tracking-wider mb-1">Final Remaining Due</p>
                            <p id="grand-due-val" class="text-3xl font-black text-red-400">0.00</p>
                        </div>

                        <button onclick="submitData()" id="submit-btn" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white py-4 rounded-xl font-bold text-lg shadow-md hover:from-blue-700 hover:to-blue-800 active:scale-95 transition-all mt-4">
                            <i class="fas fa-save mr-2"></i>SAVE RECORD
                        </button>
                    </div>
                </div>
                
                <!-- Quick Stats -->
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                    <h3 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-3">Quick Summary</h3>
                    <div class="space-y-3">
                        <div class="flex justify-between">
                            <span class="text-slate-600">Total Items Sold:</span>
                            <span id="items-sold" class="font-bold">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>
    <script src="js/script.js" defer></script>
</body>
</html>
