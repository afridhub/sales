<!-- Toast Notification -->
<div id="toast" class="toast hidden"></div>

<!-- Login Modal -->
<div id="login-box" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900 px-4 bg-opacity-90 backdrop-blur-sm">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center fade-in">
        <div class="mb-6">
            <div class="mx-auto bg-blue-600 w-12 h-12 rounded-lg flex items-center justify-center mb-4">
                <i class="fas fa-lock text-white text-xl"></i>
            </div>
            <h2 class="text-xl font-extrabold text-slate-800 uppercase tracking-widest">System Access</h2>
            <p class="text-slate-500 text-sm mt-2">Enter your PIN to continue</p>
        </div>
        <input type="password" id="pass" class="w-full text-center text-3xl tracking-[0.4em] border-b-2 border-slate-200 mb-8 focus:border-blue-500 focus:outline-none transition-colors pb-2" placeholder="••••">
        <button onclick="login()" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold hover:bg-blue-700 active:scale-95 transition-all shadow-md hover:shadow-lg">
            Unlock Dashboard
        </button>
        <p class="text-slate-400 text-xs mt-4">Default PIN: 1234</p>
    </div>
</div>
