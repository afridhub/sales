<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM Sales Management Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .input-box { border: 1px solid #ccc; padding: 6px; width: 100%; border-radius: 4px; }
        .bg-header { background-color: #1e3a8a; }
        .readonly-bg { background-color: #f3f4f6; color: #4b5563; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="login-box" class="flex items-center justify-center h-screen">
        <div class="bg-white p-8 rounded-lg shadow-xl w-96">
            <h2 class="text-2xl font-bold mb-4 text-center text-blue-900">Admin Login</h2>
            <input type="password" id="pass" class="w-full border p-2 mb-4 rounded" placeholder="Password">
            <button onclick="login()" class="w-full bg-blue-700 text-white py-2 rounded hover:bg-blue-800">Login</button>
        </div>
    </div>

    <div id="dashboard" class="hidden min-h-screen">
        <nav class="bg-header text-white p-4 flex justify-between items-center shadow-lg">
            <h1 class="text-xl font-bold">SIM Sell System</h1>
            <div class="space-x-4">
                <button onclick="switchTab('entry')" class="bg-blue-600 px-3 py-1 rounded">Daily Entry</button>
                <button onclick="switchTab('reports')" class="bg-blue-600 px-3 py-1 rounded">View Reports</button>
            </div>
        </nav>

        <div id="entry-tab" class="p-4 max-w-6xl mx-auto">
            <div class="bg-white p-6 rounded-lg shadow mb-6 grid grid-cols-1 md:grid-cols-4 gap-4">
                <div><label class="block font-semibold">Date</label><input type="date" id="date" class="input-box"></div>
                <div>
                    <label class="block font-semibold">Name</label>
                    <input type="text" id="rso-name" class="input-box" placeholder="Type Name..." onblur="checkHistoryBalance()">
                </div>
                <div>
                    <label class="block font-semibold">Role</label>
                    <select id="role" class="input-box" onchange="toggleFields()">
                        <option value="RSO">RSO</option>
                        <option value="BP">BP (SIM Only)</option>
                    </select>
                </div>
                <div class="bg-yellow-100 p-2 rounded border border-yellow-300">
                    <label class="block text-xs font-bold text-yellow-800">PREVIOUS UNPAID DUE</label>
                    <span id="history-due" class="text-xl font-bold text-red-700">0.00</span>
                </div>
            </div>

            <div class="bg-white overflow-x-auto rounded-lg shadow mb-6">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-200 text-sm">
                        <tr>
                            <th class="p-3 border">Product</th>
                            <th class="p-3 border">Rate (%)</th>
                            <th class="p-3 border">Took</th>
                            <th class="p-3 border">Sold</th>
                            <th class="p-3 border">Back (Auto)</th>
                            <th class="p-3 border text-blue-700">Total Taka</th>
                        </tr>
                    </thead>
                    <tbody id="product-rows">
                        <tr data-id="ev">
                            <td class="p-3 border font-bold">EV (Recharge)</td>
                            <td class="p-3 border"><input type="number" class="rate w-20 input-box" value="2.75" oninput="calc()"></td>
                            <td class="p-3 border"><input type="number" class="took w-24 input-box" oninput="calc()"></td>
                            <td class="p-3 border"><input type="number" class="sold w-24 input-box readonly-bg" readonly></td>
                            <td class="p-3 border"><input type="number" class="back w-24 input-box readonly-bg" value="0" readonly></td>
                            <td class="p-3 border subtotal font-bold">0.00</td>
                        </tr>
                        <tr data-id="c29" class="card-row">
                            <td class="p-3 border">29 Voice</td>
                            <td class="p-3 border"><input type="number" class="rate w-20 input-box" value="28.20" oninput="calc()"></td>
                            <td class="p-3 border"><input type="number" class="took w-24 input-box" oninput="calc()"></td>
                            <td class="p-3 border"><input type="number" class="sold w-24 input-box" oninput="calc()"></td>
                            <td class="p-3 border"><input type="number" class="back w-24 input-box readonly-bg" readonly></td>
                            <td class="p-3 border subtotal font-bold">0.00</td>
                        </tr>
                        <tr data-id="c39" class="card-row">
                            <td class="p-3 border">39 Voice</td>
                            <td class="p-3 border"><input type="number" class="rate w-20 input-box" value="37.93" oninput="calc()"></td>
                            <td class="p-3 border"><input type="number" class="took w-24 input-box" oninput="calc()"></td>
                            <td class="p-3 border"><input type="number" class="sold w-24 input-box" oninput="calc()"></td>
                            <td class="p-3 border"><input type="number" class="back w-24 input-box readonly-bg" readonly></td>
                            <td class="p-3 border subtotal font-bold">0.00</td>
                        </tr>
                        <tr data-id="c49" class="card-row">
                            <td class="p-3 border">49 Data</td>
                            <td class="p-3 border"><input type="number" class="rate w-20 input-box" value="47.65" oninput="calc()"></td>
                            <td class="p-3 border"><input type="number" class="took w-24 input-box" oninput="calc()"></td>
                            <td class="p-3 border"><input type="number" class="sold w-24 input-box" oninput="calc()"></td>
                            <td class="p-3 border"><input type="number" class="back w-24 input-box readonly-bg" readonly></td>
                            <td class="p-3 border subtotal font-bold">0.00</td>
                        </tr>
                        <tr data-id="swap">
                            <td class="p-3 border">Swap SIM</td>
                            <td class="p-3 border"><input type="number" class="rate w-20 input-box" value="332" oninput="calc()"></td>
                            <td class="p-3 border"><input type="number" class="took w-24 input-box" oninput="calc()"></td>
                            <td class="p-3 border"><input type="number" class="sold w-24 input-box" oninput="calc()"></td>
                            <td class="p-3 border"><input type="number" class="back w-24 input-box readonly-bg" readonly></td>
                            <td class="p-3 border subtotal font-bold">0.00</td>
                        </tr>
                        <tr data-id="v1">
                            <td class="p-3 border">Sim V1</td>
                            <td class="p-3 border"><input type="number" class="rate w-20 input-box" value="200" oninput="calc()"></td>
                            <td class="p-3 border"><input type="number" class="took w-24 input-box" oninput="calc()"></td>
                            <td class="p-3 border"><input type="number" class="sold w-24 input-box" oninput="calc()"></td>
                            <td class="p-3 border"><input type="number" class="back w-24 input-box readonly-bg" readonly></td>
                            <td class="p-3 border subtotal font-bold">0.00</td>
                        </tr>
                        <tr data-id="v2">
                            <td class="p-3 border">Sim V2</td>
                            <td class="p-3 border"><input type="number" class="rate w-20 input-box" value="300" oninput="calc()"></td>
                            <td class="p-3 border"><input type="number" class="took w-24 input-box" oninput="calc()"></td>
                            <td class="p-3 border"><input type="number" class="sold w-24 input-box" oninput="calc()"></td>
                            <td class="p-3 border"><input type="number" class="back w-24 input-box readonly-bg" readonly></td>
                            <td class="p-3 border subtotal font-bold">0.00</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="bg-blue-900 text-white p-6 rounded-lg shadow grid grid-cols-1 md:grid-cols-5 gap-6">
                <div><label class="block text-sm">Fuel Cost</label><input type="number" id="fuel" value="100" class="input-box text-black" oninput="calc()"></div>
                <div><label class="block text-sm">RSO Paid Today</label><input type="number" id="paid" class="input-box text-black" oninput="calc()"></div>
                <div><label class="block text-sm">Prev. Day Paying</label><input type="number" id="prev" class="input-box text-black" oninput="calc()"></div>
                <div class="col-span-2 flex flex-col justify-center text-right border-l border-blue-700 pl-4">
                    <p class="text-sm opacity-80">Today's Sales (Net): <span id="total-val" class="font-bold">0.00</span></p>
                    <p class="text-2xl font-bold">Today's Due: <span id="due-val" class="text-red-400">0.00</span></p>
                    <p class="text-sm mt-1 text-yellow-300">New Grand Total Due: <span id="grand-due-val">0.00</span></p>
                </div>
            </div>
            
            <button onclick="submitData()" id="submit-btn" class="mt-6 w-full bg-green-600 text-white py-4 rounded-lg font-bold text-xl hover:bg-green-700 transition shadow-lg">SAVE REPORT</button>
        </div>

        <div id="reports-tab" class="hidden p-4">
            <div class="bg-white p-4 rounded shadow mb-4 flex flex-wrap gap-4 items-end">
                <div><label class="block text-sm">By Date</label><input type="date" id="f-date" class="border p-2 rounded" onchange="loadTable()"></div>
                <div><label class="block text-sm">By Name</label><input type="text" id="f-name" class="border p-2 rounded" oninput="loadTable()" placeholder="Search Name..."></div>
                <button onclick="exportExcel()" class="bg-black text-white px-6 py-2 rounded">Download Excel</button>
                <button onclick="loadTable(true)" class="bg-blue-600 text-white px-6 py-2 rounded">Refresh Data</button>
            </div>
            <div id="table-wrap" class="bg-white overflow-x-auto shadow rounded">
                <table id="report-table" class="w-full text-xs border-collapse"></table>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwQ5Q95bGuZUhs0qmNGpRgqWz7MFVN0SUW_ON98b54_ug56Ac69JBWDF4Xkbu42BIEp/exec";
        let allData = [];

        function login() {
            if(document.getElementById('pass').value === "1234") {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('date').valueAsDate = new Date();
                loadTable(true);
            } else { alert("Wrong Password!"); }
        }

        function checkHistoryBalance() {
            const name = document.getElementById('rso-name').value.trim().toLowerCase();
            if (!name) return;
            
            let totalDue = 0;
            // The sheet has 'Due' in column 27 (index 27 in a 0-based array)
            // Header is index 0, so we start from 1
            allData.slice(1).forEach(row => {
                if(row[1] && row[1].toString().toLowerCase() === name) {
                    totalDue += parseFloat(row[27]) || 0;
                }
            });
            document.getElementById('history-due').innerText = totalDue.toFixed(2);
            calc();
        }

        function toggleFields() {
            let role = document.getElementById('role').value;
            document.querySelectorAll('.card-row').forEach(r => r.style.display = (role === 'BP' ? 'none' : 'table-row'));
            calc();
        }

        function calc() {
            let totalSales = 0;
            
            document.querySelectorAll('#product-rows tr').forEach(tr => {
                const id = tr.getAttribute('data-id');
                const rate = parseFloat(tr.querySelector('.rate').value) || 0;
                const took = parseFloat(tr.querySelector('.took').value) || 0;
                const soldInput = tr.querySelector('.sold');
                const backInput = tr.querySelector('.back');
                const subDisplay = tr.querySelector('.subtotal');

                if (tr.style.display !== 'none') {
                    if (id === 'ev') {
                        // EV LOGIC: Sold = Took - Rate%
                        let soldVal = took - (took * (rate / 100));
                        soldInput.value = soldVal.toFixed(2);
                        let sub = soldVal; // For EV, Taka = Sold amount
                        subDisplay.innerText = sub.toFixed(2);
                        totalSales += sub;
                    } else {
                        // OTHERS LOGIC: Back = Took - Sold
                        let sold = parseFloat(soldInput.value) || 0;
                        let backVal = took - sold;
                        backInput.value = backVal;
                        let sub = rate * sold;
                        subDisplay.innerText = sub.toFixed(2);
                        totalSales += sub;
                    }
                }
            });

            let fuel = parseFloat(document.getElementById('fuel').value) || 0;
            let paid = parseFloat(document.getElementById('paid').value) || 0;
            let prev = parseFloat(document.getElementById('prev').value) || 0;
            let histDue = parseFloat(document.getElementById('history-due').innerText) || 0;

            let netToday = totalSales - fuel;
            let dueToday = netToday - paid - prev;
            
            document.getElementById('total-val').innerText = netToday.toFixed(2);
            document.getElementById('due-val').innerText = dueToday.toFixed(2);
            document.getElementById('grand-due-val').innerText = (histDue + dueToday).toFixed(2);
        }

        async function submitData() {
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = "SAVING TO DATABASE...";
            
            const getV = (id, type) => document.querySelector(`[data-id="${id}"] .${type}`).value || 0;
            
            const data = {
                date: document.getElementById('date').value,
                name: document.getElementById('rso-name').value,
                role: document.getElementById('role').value,
                ev_t: getV('ev','took'), ev_s: getV('ev','sold'), ev_b: getV('ev','back'),
                c29_t: getV('c29','took'), c29_s: getV('c29','sold'), c29_b: getV('c29','back'),
                c39_t: getV('c39','took'), c39_s: getV('c39','sold'), c39_b: getV('c39','back'),
                c49_t: getV('c49','took'), c49_s: getV('c49','sold'), c49_b: getV('c49','back'),
                sw_t: getV('swap','took'), sw_s: getV('swap','sold'), sw_b: getV('swap','back'),
                v1_t: getV('v1','took'), v1_s: getV('v1','sold'), v1_b: getV('v1','back'),
                v2_t: getV('v2','took'), v2_s: getV('v2','sold'), v2_b: getV('v2','back'),
                fuel: document.getElementById('fuel').value,
                total: document.getElementById('total-val').innerText,
                paid: document.getElementById('paid').value,
                due: document.getElementById('due-val').innerText,
                prev: document.getElementById('prev').value
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
                alert("Report Saved Successfully!");
                location.reload();
            } catch (e) { alert("Error! Check connection."); btn.disabled = false; }
        }

        async function loadTable(force = false) {
            if(force) {
                const res = await fetch(SCRIPT_URL);
                allData = await res.json();
            }
            let html = "";
            let fDate = document.getElementById('f-date').value;
            let fName = document.getElementById('f-name').value.toLowerCase();

            allData.forEach((row, i) => {
                if(i === 0) {
                    html += `<tr class="bg-gray-800 text-white">` + row.map(h => `<th class="p-2 border">${h}</th>`).join('') + `</tr>`;
                } else {
                    if((!fDate || row[0].includes(fDate)) && (!fName || row[1].toLowerCase().includes(fName))) {
                        html += `<tr class="hover:bg-gray-100">` + row.map(c => `<td class="p-2 border">${c}</td>`).join('') + `</tr>`;
                    }
                }
            });
            document.getElementById('report-table').innerHTML = html;
        }

        function switchTab(t) {
            document.getElementById('entry-tab').classList.toggle('hidden', t !== 'entry');
            document.getElementById('reports-tab').classList.toggle('hidden', t !== 'reports');
        }

        function exportExcel() {
            let table = document.getElementById("report-table");
            let wb = XLSX.utils.table_to_book(table, {sheet: "DailySales"});
            XLSX.writeFile(wb, "Sales_Export.xlsx");
        }
    </script>
</body>
</html>
