<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM Sales Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .input-box { border: 1px solid #ccc; padding: 4px; width: 100%; border-radius: 4px; }
        .bg-header { background-color: #1e3a8a; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="login-box" class="flex items-center justify-center h-screen">
        <div class="bg-white p-8 rounded-lg shadow-xl w-96">
            <h2 class="text-2xl font-bold mb-4 text-center">Admin Login</h2>
            <input type="password" id="pass" class="w-full border p-2 mb-4 rounded" placeholder="Enter Password">
            <button onclick="login()" class="w-full bg-blue-700 text-white py-2 rounded hover:bg-blue-800">Login</button>
        </div>
    </div>

    <div id="dashboard" class="hidden min-h-screen">
        <nav class="bg-header text-white p-4 flex justify-between items-center shadow-lg">
            <h1 class="text-xl font-bold">SIM Sell Report</h1>
            <div class="space-x-4">
                <button onclick="switchTab('entry')" class="hover:underline">Daily Entry</button>
                <button onclick="switchTab('reports')" class="hover:underline">View Reports</button>
            </div>
        </nav>

        <div id="entry-tab" class="p-4 max-w-5xl mx-auto">
            <div class="bg-white p-6 rounded-lg shadow mb-6 grid grid-cols-1 md:grid-cols-3 gap-4">
                <div><label class="block font-semibold">Date</label><input type="date" id="date" class="input-box"></div>
                <div><label class="block font-semibold">Name</label><input type="text" id="rso-name" class="input-box" placeholder="Name"></div>
                <div>
                    <label class="block font-semibold">Role</label>
                    <select id="role" class="input-box" onchange="toggleFields()">
                        <option value="RSO">RSO (Full Access)</option>
                        <option value="BP">BP (SIM Only)</option>
                    </select>
                </div>
            </div>

            <div class="bg-white overflow-x-auto rounded-lg shadow">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-200">
                        <tr>
                            <th class="p-3 border">Product</th>
                            <th class="p-3 border">Rate</th>
                            <th class="p-3 border">Took</th>
                            <th class="p-3 border">Sold</th>
                            <th class="p-3 border">Back</th>
                            <th class="p-3 border">Total Taka</th>
                        </tr>
                    </thead>
                    <tbody id="product-rows">
                        <tr data-id="ev"> <td class="p-3 border font-medium">EV (Recharge)</td> <td class="p-3 border"><input type="number" class="rate w-20" value="1" oninput="calc()"></td> <td class="p-3 border"><input type="number" class="took w-20 border"></td> <td class="p-3 border"><input type="number" class="sold w-20 border" oninput="calc()"></td> <td class="p-3 border"><input type="number" class="back w-20 border"></td> <td class="p-3 border subtotal">0</td> </tr>
                        <tr data-id="c29" class="card-row"> <td class="p-3 border font-medium">29 Voice Card</td> <td class="p-3 border"><input type="number" class="rate w-20" value="28.20" oninput="calc()"></td> <td class="p-3 border"><input type="number" class="took w-20 border"></td> <td class="p-3 border"><input type="number" class="sold w-20 border" oninput="calc()"></td> <td class="p-3 border"><input type="number" class="back w-20 border"></td> <td class="p-3 border subtotal">0</td> </tr>
                        <tr data-id="c39" class="card-row"> <td class="p-3 border font-medium">39 Voice Card</td> <td class="p-3 border"><input type="number" class="rate w-20" value="37.93" oninput="calc()"></td> <td class="p-3 border"><input type="number" class="took w-20 border"></td> <td class="p-3 border"><input type="number" class="sold w-20 border" oninput="calc()"></td> <td class="p-3 border"><input type="number" class="back w-20 border"></td> <td class="p-3 border subtotal">0</td> </tr>
                        <tr data-id="c49" class="card-row"> <td class="p-3 border font-medium">49 Data Card</td> <td class="p-3 border"><input type="number" class="rate w-20" value="47.65" oninput="calc()"></td> <td class="p-3 border"><input type="number" class="took w-20 border"></td> <td class="p-3 border"><input type="number" class="sold w-20 border" oninput="calc()"></td> <td class="p-3 border"><input type="number" class="back w-20 border"></td> <td class="p-3 border subtotal">0</td> </tr>
                        <tr data-id="swap"> <td class="p-3 border font-medium">Swap SIM</td> <td class="p-3 border"><input type="number" class="rate w-20" value="332" oninput="calc()"></td> <td class="p-3 border"><input type="number" class="took w-20 border"></td> <td class="p-3 border"><input type="number" class="sold w-20 border" oninput="calc()"></td> <td class="p-3 border"><input type="number" class="back w-20 border"></td> <td class="p-3 border subtotal">0</td> </tr>
                        <tr data-id="v1"> <td class="p-3 border font-medium">Sim Piece V1</td> <td class="p-3 border"><input type="number" class="rate w-20" value="200" oninput="calc()"></td> <td class="p-3 border"><input type="number" class="took w-20 border"></td> <td class="p-3 border"><input type="number" class="sold w-20 border" oninput="calc()"></td> <td class="p-3 border"><input type="number" class="back w-20 border"></td> <td class="p-3 border subtotal">0</td> </tr>
                        <tr data-id="v2"> <td class="p-3 border font-medium">Sim Piece V2</td> <td class="p-3 border"><input type="number" class="rate w-20" value="300" oninput="calc()"></td> <td class="p-3 border"><input type="number" class="took w-20 border"></td> <td class="p-3 border"><input type="number" class="sold w-20 border" oninput="calc()"></td> <td class="p-3 border"><input type="number" class="back w-20 border"></td> <td class="p-3 border subtotal">0</td> </tr>
                    </tbody>
                </table>
            </div>

            <div class="mt-6 bg-blue-50 p-6 rounded-lg shadow grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                <div><label class="block font-bold">Fuel Cost</label><input type="number" id="fuel" value="100" class="input-box" oninput="calc()"></div>
                <div><label class="block font-bold">RSO Paid</label><input type="number" id="paid" class="input-box" oninput="calc()"></div>
                <div><label class="block font-bold">Prev. Day Paying</label><input type="number" id="prev" class="input-box" oninput="calc()"></div>
                <div class="text-right">
                    <p class="text-sm text-gray-600">Total Sales: <span id="total-val">0</span></p>
                    <p class="text-xl font-bold text-red-600">Total Due: <span id="due-val">0</span></p>
                </div>
            </div>
            <button onclick="submitData()" id="submit-btn" class="mt-6 w-full bg-green-600 text-white py-3 rounded-lg font-bold text-lg hover:bg-green-700">Save Daily Report</button>
        </div>

        <div id="reports-tab" class="hidden p-4">
            <div class="flex flex-wrap gap-4 mb-4 items-end">
                <div><label class="block text-sm">Filter Date</label><input type="date" id="f-date" class="border p-2 rounded" onchange="loadTable()"></div>
                <div><label class="block text-sm">Filter Name</label><input type="text" id="f-name" class="border p-2 rounded" oninput="loadTable()" placeholder="Search..."></div>
                <button onclick="exportExcel()" class="bg-black text-white px-4 py-2 rounded">Export to Excel</button>
                <button onclick="loadTable(true)" class="bg-blue-600 text-white px-4 py-2 rounded">Refresh Data</button>
            </div>
            <div id="table-wrap" class="bg-white overflow-x-auto shadow rounded">
                <table id="report-table" class="w-full text-xs border-collapse">
                    </table>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzp22TdwWTPd3RRCJHWIH-xw0H4l43EfuOvPFBPgjSXZjrzU_e-JkmWCbxlAVuS0b5q/exec"; // PASTE YOUR GOOGLE LINK HERE
        let allData = [];

        function login() {
            if(document.getElementById('pass').value === "1234") { // Change your password here
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('date').valueAsDate = new Date();
                loadTable(true);
            } else { alert("Wrong Password!"); }
        }

        function switchTab(t) {
            document.getElementById('entry-tab').classList.toggle('hidden', t !== 'entry');
            document.getElementById('reports-tab').classList.toggle('hidden', t !== 'reports');
        }

        function toggleFields() {
            let role = document.getElementById('role').value;
            document.querySelectorAll('.card-row').forEach(r => r.style.display = (role === 'BP' ? 'none' : 'table-row'));
            calc();
        }

        function calc() {
            let sum = 0;
            document.querySelectorAll('#product-rows tr').forEach(tr => {
                if(tr.style.display !== 'none') {
                    let r = tr.querySelector('.rate').value || 0;
                    let s = tr.querySelector('.sold').value || 0;
                    let sub = r * s;
                    tr.querySelector('.subtotal').innerText = sub.toFixed(2);
                    sum += sub;
                }
            });
            let fuel = document.getElementById('fuel').value || 0;
            let paid = document.getElementById('paid').value || 0;
            let prev = document.getElementById('prev').value || 0;
            let total = sum - fuel;
            document.getElementById('total-val').innerText = total.toFixed(2);
            document.getElementById('due-val').innerText = (total - paid - prev).toFixed(2);
        }

        async function submitData() {
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = "Saving...";
            
            const getVal = (id, type) => document.querySelector(`[data-id="${id}"] .${type}`).value || 0;
            
            const data = {
                date: document.getElementById('date').value,
                name: document.getElementById('rso-name').value,
                role: document.getElementById('role').value,
                ev_t: getVal('ev','took'), ev_s: getVal('ev','sold'), ev_b: getVal('ev','back'),
                c29_t: getVal('c29','took'), c29_s: getVal('c29','sold'), c29_b: getVal('c29','back'),
                c39_t: getVal('c39','took'), c39_s: getVal('c39','sold'), c39_b: getVal('c39','back'),
                c49_t: getVal('c49','took'), c49_s: getVal('c49','sold'), c49_b: getVal('c49','back'),
                sw_t: getVal('swap','took'), sw_s: getVal('swap','sold'), sw_b: getVal('swap','back'),
                v1_t: getVal('v1','took'), v1_s: getVal('v1','sold'), v1_b: getVal('v1','back'),
                v2_t: getVal('v2','took'), v2_s: getVal('v2','sold'), v2_b: getVal('v2','back'),
                fuel: document.getElementById('fuel').value,
                total: document.getElementById('total-val').innerText,
                paid: document.getElementById('paid').value,
                due: document.getElementById('due-val').innerText,
                prev: document.getElementById('prev').value
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
                alert("Saved successfully!");
                location.reload();
            } catch (e) { alert("Error saving. Check your URL."); btn.disabled = false; }
        }

        async function loadTable(force = false) {
            if(force) {
                const res = await fetch(SCRIPT_URL);
                allData = await res.json();
            }
            let html = "";
            let fDate = document.getElementById('f-date').value;
            let fName = document.getElementById('f-name').value.toLowerCase();

            allData.forEach((row, i) => {
                if(i === 0) { // Header
                    html += `<tr class="bg-gray-800 text-white">` + row.map(h => `<th class="p-2 border">${h}</th>`).join('') + `</tr>`;
                } else {
                    if((!fDate || row[0].includes(fDate)) && (!fName || row[1].toLowerCase().includes(fName))) {
                        html += `<tr>` + row.map(c => `<td class="p-2 border">${c}</td>`).join('') + `</tr>`;
                    }
                }
            });
            document.getElementById('report-table').innerHTML = html;
        }

        function exportExcel() {
            let table = document.getElementById("report-table");
            let wb = XLSX.utils.table_to_book(table, {sheet: "Sales"});
            XLSX.writeFile(wb, "Sales_Report.xlsx");
        }
    </script>
</body>
</html>
